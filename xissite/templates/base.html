<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Cache Control -->
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">
        
        <!-- Basic Meta -->
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>{% block title %}Tull Hydroponics{% endblock %}</title>
        <meta name="description" content="Tull Hydroponics - Data-driven aeroponic tower systems">
        
        <!-- Viewport with iPhone safe area support -->
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        
        <!-- iPhone Status Bar Styling -->
        <meta name="theme-color" content="#000000">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        
        <!-- Favicon -->
        <link rel="icon" href="{{ url_for('static', filename='icons/favicon.svg') }}" type="image/svg+xml">
        
        <!-- Main Stylesheet -->
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/main.css') }}">
        
        {% block head %}{% endblock %}
    </head>
    <body>
        <!-- Transition Screen -->
        <div id="transitionScreen" class="transition-screen">
            <img src="{{ url_for('static', filename='images/Tulllogo.svg') }}" alt="Tull" class="transition-logo">
        </div>
        
        {% block sectionconfig %}
        <section class="main-grid">
        {% endblock %}
            {% block titleconfig %}
            <div class="card-title">
            {% endblock %}
                {% block titletext %}<a href="/" class="logo-link">{% endblock %}
                {% block pagetitle %}<img src="{{ url_for('static', filename='images/Tulllogo.svg') }}" alt="Tull" class="header-logo">{% endblock %}
                </a>
                {% block titleicon %}{% endblock %}
            </div>
            
            {% block content %}{% endblock %}
        </section>
        
        <!-- Page Transition Script -->
        <script>
            (function() {
                const transitionScreen = document.getElementById('transitionScreen');
                
                // Hide transition screen after page load
                window.addEventListener('load', function() {
                    setTimeout(function() {
                        transitionScreen.classList.add('hidden');
                    }, 400);
                });
                
                // Show transition when navigating to internal links
                document.addEventListener('click', function(e) {
                    const link = e.target.closest('a');
                    if (link && 
                        link.href && 
                        link.href.startsWith(window.location.origin) && 
                        !link.target && 
                        !link.href.includes('#')) {
                        e.preventDefault();
                        transitionScreen.classList.remove('hidden');
                        setTimeout(function() {
                            window.location.href = link.href;
                        }, 300);
                    }
                });
                
                // Handle browser back/forward
                window.addEventListener('pageshow', function(e) {
                    if (e.persisted) {
                        transitionScreen.classList.add('hidden');
                    }
                });
            })();
        </script>
    </body>
</html>
