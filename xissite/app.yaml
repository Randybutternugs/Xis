# ============================================================================
# SCALING
# ============================================================================
automatic_scaling:
  min_instances: 1
  max_instances: 10
  min_idle_instances: 1
  max_concurrent_requests: 50
  target_cpu_utilization: 0.65

# ============================================================================
# REQUEST HANDLERS
# ============================================================================
handlers:
  # Static files (served directly by App Engine - faster)
  - url: /static
    static_dir: xissite/static
    secure: always
    http_headers:
      Cache-Control: "public, max-age=3600"

  # Favicon
  - url: /favicon.ico
    static_files: xissite/static/icons/tullicon.ico
    upload: xissite/static/icons/tullicon.ico
    secure: always

  # All other URLs handled by Flask
  - url: /.*
    script: auto
    secure: always

# ============================================================================
# INSTANCE & NETWORK
# ============================================================================
instance_class: F1

network:
  session_affinity: true

inbound_services:
  - warmup
